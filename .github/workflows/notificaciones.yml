name: Deploy ms-notificacion

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: notificaciones_v3
    steps:
      # Descargar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configurar Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Compilar el proyecto
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Desplegar en la EC2
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST_NOTI }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            echo "=== Descargando imagen ==="
            sudo docker pull alexsander1234/ms-notificacion:latest

            echo "=== Creando red si no existe ==="
            sudo docker network inspect ms-network >/dev/null 2>&1 || \
            sudo docker network create ms-network

            echo "=== Verificando MySQL ==="

            if [ "$(sudo docker ps -aq -f name=mysql-notificacion)" ]; then

              echo "MySQL existe"

              if [ -z "$(sudo docker ps -q -f name=mysql-notificacion)" ]; then
                echo "Iniciando MySQL..."
                sudo docker start mysql-notificacion
              fi

            else

              echo "Creando MySQL..."

              sudo docker run -d --name mysql-notificacion --network ms-network -e MYSQL_ROOT_PASSWORD=password -e MYSQL_DATABASE=mysql-notificaciones -e MYSQL_USER=myuser -e MYSQL_PASSWORD=password -p 3308:3306 mysql:8

            fi

            echo "Esperando que MySQL inicie..."
            sleep 25

            echo "=== Verificando usuario de prueba ==="

            EXISTE=$(sudo docker exec mysql-notificacion mysql -umyuser -ppassword -N -s \
            -e "USE \`mysql-notificaciones\`; SELECT COUNT(*) FROM user WHERE id=1;")

            if [ "$EXISTE" = "0" ]; then

              echo "Insertando usuario..."

              sudo docker exec mysql-notificacion mysql -umyuser -ppassword -e "
              USE \`mysql-notificaciones\`;
              INSERT INTO user(id,email,password,username)
              VALUES (1,'test@mail.cl','1234','test');
              "

            else

              echo "El usuario ya existe."

            fi

            echo "=== Reiniciando microservicio ==="

            sudo docker rm -f ms-notificacion || true

            sudo docker run -d --name ms-notificacion --network ms-network -p 8182:8180 alexsander1234/ms-notificacion:latest

            echo "Esperando inicio del microservicio..."
            sleep 20

            sudo docker ps