name: Deploy ms-usuarios

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Descargar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # Configurar Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Compilar el proyecto (opcional)
      - name: Build with Maven
        run: mvn clean package -DskipTests

      # Conectarse a la EC2 y desplegar
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # Descargar la última imagen
            sudo docker pull alexsander1234/ms-usuarios:latest

            # Crear la red si no existe
            sudo docker network inspect ms-network >/dev/null 2>&1 || \
            sudo docker network create ms-network

            # Crear MySQL solo si no existe
            if [ -z "$(sudo docker ps -aq -f name=mysql-usuario)" ]; then
              sudo docker run -d \
                --name mysql-usuario \
                --network ms-network \
                -e MYSQL_ROOT_PASSWORD=password \
                -e MYSQL_DATABASE=mysql-usuarios \
                -e MYSQL_USER=myuser \
                -e MYSQL_PASSWORD=password \
                -p 3310:3306 \
                mysql:8
            fi

            # Reiniciar el microservicio
            sudo docker rm -f ms-usuarios || true

            sudo docker run -d \
              --name ms-usuarios \
              --network ms-network \
              -p 8180:8180 \
              alexsander1234/ms-usuarios:latest